<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Plant Care</title>

  <link rel="manifest" href="manifest.webmanifest">
  <link rel="stylesheet" href="styles.css">

  <!-- iPhone Home Screen behavior -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

  <!-- iPhone app icon (you will add this file) -->
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
</head>

<body>

<header>
  <h1>🌿 Plant Care</h1>
  <button onclick="openPlant()">+ Add Plant</button>
</header>

<section id="dueSection">
  <h2>Needs Attention</h2>
  <div id="dueList"></div>
</section>

<section>
  <h2>All Plants</h2>
  <div id="plantList"></div>
</section>

<div id="plantModal" class="modal">
  <div class="modalContent">

    <h2 id="modalTitle">Add Plant</h2>

    <input id="plantName" placeholder="Plant name">

    <input id="plantLocation" placeholder="Location">

    <!-- Seasonal watering -->
    <label>Water every (summer days)</label>
    <input id="waterSummer" type="number" min="0" placeholder="e.g., 7">

    <label>Water every (winter days)</label>
    <input id="waterWinter" type="number" min="0" placeholder="e.g., 14">

    <label>Last watered</label>
    <input id="lastWater" type="date">

    <!-- Misting -->
    <label>Mist every (days)</label>
    <input id="mistEvery" type="number" min="0" placeholder="e.g., 2">

    <label>Last misted</label>
    <input id="lastMist" type="date">

    <!-- Fertilize -->
    <label>Fertilize every (days)</label>
    <input id="fertEvery" type="number" min="0" placeholder="e.g., 30">

    <label>Last fertilized</label>
    <input id="lastFert" type="date">

    <!-- Repot -->
    <label>Repot every (months)</label>
    <input id="repotEvery" type="number" min="0" placeholder="e.g., 12">

    <label>Last repotted</label>
    <input id="lastRepot" type="date">

    <!-- Photo -->
    <label>Photo</label>
    <input type="file" id="photoInput" accept="image/*">
    <img id="photoPreview" alt="Plant photo preview">

    <textarea id="notes" placeholder="Notes"></textarea>

    <div class="buttons">
      <button onclick="savePlant()">Save</button>
      <button onclick="deletePlant()">Delete</button>
      <button onclick="closePlant()">Cancel</button>
    </div>

  </div>
</div>

<script src="app.js"></script>
</body>
</html>
